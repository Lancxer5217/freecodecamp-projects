<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>

<body>
    <h1 id="title">Gamer's Survey</h1>
    <p id="description">Help us improve the ultimate gaming experience</p>

    <form id="survey-form">
        <fieldset>
            <legend>Personal Information</legend>

            <label for="name" id="name-label">Gamer Tag:</label>
            <input type="text" id="name" name="name" placeholder="e.g. Lanxcer5217" required>

            <label for="email" id="email-label">Email:</label>
            <input type="email" id="email" name="email" placeholder="e.g. juancruz@gmail.com" required>

            <label for="number" id="number-label">Daily Gaming Time in Hours (Optional)</label>
            <input type="number" id="number" min="0" max="24" placeholder="e.g 2">
        </fieldset>

        <fieldset>
            <legend>Gaming Preference</legend>

            <label for="dropdown">Preferred gaming platform?</label>
            <select id="dropdown" name="platform">
                <option value="PC">PC</option>
                <option value="PlayStation">PlayStation</option>
                <option value="Xbox">Xbox</option>
                <option value="Nintendo Switch">Nintendo Switch</option>
                <option value="Mobile">Mobile</option>
            </select>

            <p>Preferred game genre?</p>

            <label for="rpg">RPG:</label>
            <input type="radio" name="genre" id="rpg" value="rpg" checked>
            <br>

            <label for="fps">FPS:</label>
            <input type="radio" name="genre" id="fps" value="fps">
            <br>

            <label for="strategy">Strategy:</label>
            <input type="radio" name="genre" id="strategy" value="strategy">
            <br>

            <label for="platformer">Platformer:</label>
            <input type="radio" name="genre" id="platformer" value="platformer">

            <p>Which features matter to you?</p>

            <label for="graphics">Graphics:</label>
            <input type="checkbox" name="features" id="graphics" value="graphics">

            <label for="storyline">Storyline:</label>
            <input type="checkbox" name="features" id="storyline" value="storyline">

            <label for="multiplayer">Multiplayer:</label>
            <input type="checkbox" name="features" id="multiplayer" value="multiplayer">

            <label for="mod-support">Mod Support:</label>
            <input type="checkbox" name="features" id="mod-support" value="mod-support">

            <label for="soundtrack">Soundtrack:</label>
            <input type="checkbox" name="features" id="soundtrack" value="soundtrack">
        </fieldset>

        <fieldset>
            <legend>Additional Comments</legend>

            <label for="comments">Any other gaming recommendations?</label>
            <textarea name="comments" id="comments" rows="4" cols="20" placeholder="Share your thoughts..."></textarea>
        </fieldset>


</body>

</html>
